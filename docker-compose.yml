services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app:
    build: .
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    depends_on:
      - redis
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: Europe/Copenhagen
      REDIS_HOST: redis
      USER_ID: ${USER_ID}
      ADMIN_KEY: ${ADMIN_KEY}
      HOSTNAME: ${HOSTNAME}
      AUDIENCE: ${AUDIENCE}
      OLD_JTI: ${OLD_JTI}
      SCOPES: ${SCOPES}
      SERVICE: ${SERVICE}
